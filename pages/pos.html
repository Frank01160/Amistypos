<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMISTY POS - Seller Dashboard</title>
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/pos.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <div class="pos-container">
        <!-- Header -->
        <header class="pos-header">
            <div class="header-left">
                <h1>AMISTY POS</h1>
                <span class="user-badge">Seller</span>
            </div>
            <div class="header-center">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search products..." oninput="searchProducts()">
                    <span class="search-icon">🔍</span>
                </div>
            </div>
            <div class="header-right">
                <div class="offline-indicator" id="offlineBadge" style="display: none;">⏳</div>
                <button class="btn-icon" onclick="window.location.href='reports.html'" title="View Reports">
                    📊
                </button>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </header>

        <!-- Main Content -->
        <div class="pos-main">
            <!-- Categories Sidebar -->
            <aside class="categories-panel">
                <div class="categories-header">
                    <h3>Categories</h3>
                </div>
                <div class="categories-list" id="categoriesList">
                    <!-- Dynamically populated -->
                </div>
                <button class="btn-show-all active" onclick="filterByCategory('all')">
                    📦 All Products
                </button>
            </aside>

            <!-- Products Grid -->
            <main class="products-panel">
                <div class="products-header">
                    <h3 id="currentCategory">All Products</h3>
                    <span class="product-count" id="productCount">0 items</span>
                </div>
                <div class="products-grid" id="productsGrid">
                    <!-- Dynamically populated -->
                </div>
            </main>

            <!-- Basket Panel -->
            <aside class="basket-panel">
                <div class="basket-header">
                    <h3>🛒 Current Sale</h3>
                    <button class="btn-clear" onclick="clearBasket()">Clear</button>
                </div>
                
                <div class="basket-items" id="basketItems">
                    <div class="empty-basket">
                        <p>No items in basket</p>
                        <span>Select products to begin</span>
                    </div>
                </div>

                <div class="basket-summary">
                    <div class="summary-row">
                        <span>Subtotal:</span>
                        <span id="subtotal">KSh 0</span>
                    </div>
                    <div class="summary-row discount-row">
                        <span>Discount (KSh):</span>
                        <input type="number" id="discountInput" value="0" min="0" onchange="updateTotals()">
                    </div>
                    <div class="summary-row total-row">
                        <span>TOTAL:</span>
                        <span id="total">KSh 0</span>
                    </div>
                </div>

                <div class="customer-info">
                    <input type="text" id="customerName" placeholder="Customer name (optional)">
                    <input type="tel" id="customerPhone" placeholder="Phone number (optional)">
                </div>

                <div class="payment-section">
                    <div class="payment-methods">
                        <button class="payment-btn active" onclick="selectPayment('cash')">
                            💵 Cash
                        </button>
                        <button class="payment-btn" onclick="selectPayment('mobile')">
                            📱 M-Pesa
                        </button>
                    </div>
                    
                    <div class="cash-input" id="cashInput">
                        <label>Amount Received:</label>
                        <input type="number" id="amountReceived" placeholder="Enter amount" oninput="calculateChange()">
                    </div>
                    
                    <div class="change-due" id="changeDue" style="display: none;">
                        <span>Change:</span>
                        <span id="changeAmount">KSh 0</span>
                    </div>

                    <button class="btn-confirm" onclick="confirmPayment()">
                        ✅ Confirm Payment
                    </button>
                </div>
            </aside>
        </div>
    </div>

    <!-- Customer Display (Split Screen) -->
    <div class="customer-display" id="customerDisplay">
        <div class="customer-display-header">
            <h2>AMISTY COMPANY</h2>
            <p>Your Basket</p>
        </div>
        <div class="customer-display-items" id="customerDisplayItems">
            <!-- Mirrored basket items -->
        </div>
        <div class="customer-display-total">
            <span id="customerDisplayTotal">KSh 0</span>
        </div>
    </div>

    <!-- Receipt Modal -->
    <div class="modal-overlay" id="receiptModal" style="display: none;">
        <div class="modal-content receipt-modal">
            <div class="receipt" id="receiptContent">
                <!-- Generated receipt -->
            </div>
            <div class="receipt-actions">
                <button class="btn-primary" onclick="printReceipt()">🖨️ Print Receipt</button>
                <button class="btn-secondary" onclick="downloadReceipt()">📥 Download</button>
                <button class="btn-secondary" onclick="closeReceipt()">✖️ Close</button>
            </div>
        </div>
    </div>

    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/data-service.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/receipt.js"></script>
    <script src="../js/pos.js"></script>
</body>
</html>
