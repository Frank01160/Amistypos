<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMISTY POS - Reports</title>
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/manager.css">
    <link rel="stylesheet" href="../css/reports.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <div class="manager-layout">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg width="40" height="40" viewBox="0 0 40 40">
                        <circle cx="20" cy="20" r="18" fill="none" stroke="#87CEEB" stroke-width="2"/>
                        <path d="M12 20 L18 26 L28 14" stroke="#90EE90" stroke-width="3" fill="none"/>
                    </svg>
                </div>
                <h2>AMISTY</h2>
                <span class="user-role">Manager</span>
            </div>
            
            <ul class="sidebar-menu">
                <li><a href="manager.html">📊 Dashboard</a></li>
                <li><a href="inventory.html">📦 Inventory</a></li>
                <li><a href="reports.html" class="active">📈 Reports</a></li>
                <li><a href="settings.html">⚙️ Settings</a></li>
            </ul>
            
            <div class="sidebar-footer">
                <button class="btn-logout" onclick="logout()">
                    <span>🚪</span>
                    <span>Logout</span>
                </button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <div class="header-left">
                    <button class="btn-menu-toggle" onclick="toggleSidebar()">☰</button>
                    <h1>Sales Reports</h1>
                </div>
                <div class="header-right">
                    <button class="btn-primary" onclick="exportReport()">📤 Export Report</button>
                </div>
            </header>

            <!-- Report Filters -->
            <div class="reports-filters">
                <div class="filter-group">
                    <label>Date Range</label>
                    <div class="date-range">
                        <input type="date" id="startDate" onchange="generateReport()">
                        <span>to</span>
                        <input type="date" id="endDate" onchange="generateReport()">
                        <button class="btn-small" onclick="setToday()">Today</button>
                        <button class="btn-small" onclick="setThisWeek()">This Week</button>
                        <button class="btn-small" onclick="setThisMonth()">This Month</button>
                    </div>
                </div>
                
                <div class="filter-group">
                    <label>Category</label>
                    <select id="reportCategory" onchange="generateReport()">
                        <option value="all">All Categories</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>Payment Method</label>
                    <select id="reportPayment" onchange="generateReport()">
                        <option value="all">All Payments</option>
                        <option value="cash">Cash</option>
                        <option value="mobile">M-Pesa</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>Report Type</label>
                    <select id="reportType" onchange="generateReport()">
                        <option value="summary">Sales Summary</option>
                        <option value="detailed">Detailed Transactions</option>
                        <option value="products">Product Sales</option>
                        <option value="categories">Category Breakdown</option>
                    </select>
                </div>
            </div>

            <!-- Report Summary Cards -->
            <div class="report-summary" id="reportSummary">
                <div class="summary-card">
                    <h4>Total Sales</h4>
                    <p id="totalSales">KSh 0</p>
                </div>
                <div class="summary-card">
                    <h4>Transactions</h4>
                    <p id="totalTransactions">0</p>
                </div>
                <div class="summary-card">
                    <h4>Cash Payments</h4>
                    <p id="cashPayments">KSh 0</p>
                </div>
                <div class="summary-card">
                    <h4>M-Pesa Payments</h4>
                    <p id="mobilePayments">KSh 0</p>
                </div>
                <div class="summary-card">
                    <h4>Total Profit</h4>
                    <p id="totalProfit">KSh 0</p>
                </div>
            </div>

            <!-- Report Table -->
            <div class="content-section">
                <div class="section-header">
                    <h2 id="reportTableTitle">Sales Report</h2>
                </div>
                <div class="table-container">
                    <table class="data-table" id="reportTable">
                        <thead id="reportTableHead"></thead>
                        <tbody id="reportTableBody">
                            <tr class="table-loading">
                                <td colspan="6">
                                    <div class="skeleton" style="height:20px;width:100%;"></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/data-service.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/reports.js"></script>
</body>
</html>
