<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMISTY POS - Login</title>
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        /* Critical inline styles to ensure everything works */
        .hidden {
            display: none !important;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        @keyframes slideOutRight {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(100%); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo-animation">
                <svg width="80" height="80" viewBox="0 0 80 80">
                    <circle cx="40" cy="40" r="35" fill="none" stroke="#87CEEB" stroke-width="3"/>
                    <path d="M25 40 L35 50 L55 30" stroke="#90EE90" stroke-width="4" fill="none"/>
                </svg>
            </div>
            <h1>AMISTY COMPANY</h1>
            <p class="subtitle">Point of Sale System</p>
        </div>

        <div class="cards-container">
            <!-- Manager Card -->
            <div class="login-card manager-card" onclick="selectRole('manager')">
                <div class="card-icon">
                    <svg width="60" height="60" viewBox="0 0 60 60">
                        <rect x="15" y="20" width="30" height="25" rx="3" fill="#87CEEB"/>
                        <path d="M20 20 L30 10 L40 20" fill="#5BA3D9"/>
                        <circle cx="30" cy="35" r="5" fill="white"/>
                    </svg>
                </div>
                <h2>Manager</h2>
                <p>Inventory, Reports & Settings</p>
                <div class="card-hover-effect"></div>
            </div>

            <!-- Seller Card -->
            <div class="login-card seller-card" onclick="selectRole('seller')">
                <div class="card-icon">
                    <svg width="60" height="60" viewBox="0 0 60 60">
                        <rect x="10" y="15" width="40" height="30" rx="3" fill="#90EE90"/>
                        <line x1="20" y1="25" x2="40" y2="25" stroke="white" stroke-width="2"/>
                        <line x1="20" y1="32" x2="35" y2="32" stroke="white" stroke-width="2"/>
                        <circle cx="45" cy="40" r="8" fill="#87CEEB"/>
                    </svg>
                </div>
                <h2>Seller</h2>
                <p>Point of Sale & Transactions</p>
                <div class="card-hover-effect"></div>
            </div>
        </div>

        <div id="loginForm" class="login-form hidden">
            <h3 id="loginTitle">Manager Login</h3>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="off">
                <button class="toggle-password" onclick="togglePassword()" type="button">👁️</button>
            </div>
            <div class="error-message" id="errorMessage"></div>
            <div class="login-actions">
                <button class="btn-back" onclick="goBack()" type="button">← Back</button>
                <button class="btn-login" onclick="login()" type="button">Login</button>
            </div>
            <div class="attempts-info" id="attemptsInfo"></div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- Firebase Config -->
    <script src="js/firebase-config.js"></script>
    
    <!-- Auth System (Load last to ensure all dependencies) -->
    <script src="js/auth.js"></script>
    
    <script>
        // Simple initialization
        console.log('AMISTY POS Login Page Loaded');
        
        // Initialize Firebase if SDK is loaded
        if (typeof firebase !== 'undefined') {
            console.log('Firebase SDK loaded');
            if (typeof initializeFirebase === 'function') {
                initializeFirebase();
            }
        } else {
            console.warn('Firebase SDK not loaded, using localStorage fallback');
        }
    </script>
</body>
</html>
